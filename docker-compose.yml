services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_BIND:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
    volumes:
      - ollama_data:/root/.ollama
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        ollama serve &
        serve_pid=$!
        trap 'kill -TERM "$serve_pid"; wait "$serve_pid"' INT TERM

        echo "[ollama-init] Waiting for local Ollama API..."
        until ollama list >/dev/null 2>&1; do
          sleep 1
        done

        if ! ollama list | awk 'NR>1 {print $1}' | grep -Fxq "${OLLAMA_MODEL}"; then
          echo "[ollama-init] Pulling model ${OLLAMA_MODEL}..."
          ollama pull "${OLLAMA_MODEL}"
        else
          echo "[ollama-init] Model ${OLLAMA_MODEL} already present; skipping pull."
        fi

        echo "[ollama-init] Ready."
        wait "$serve_pid"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  odysseus:
    build:
      context: "https://github.com/pewdiepie-archdaemon/odysseus.git#${ODYSSEUS_REF:-main}"
    container_name: odysseus
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${ODYSSEUS_BIND:-127.0.0.1}:${ODYSSEUS_PORT:-7000}:7000"
    environment:
      AUTH_ENABLED: "${AUTH_ENABLED:-true}"
      ODYSSEUS_ADMIN_USER: "${ODYSSEUS_ADMIN_USER:-admin}"
      ODYSSEUS_ADMIN_PASSWORD: "${ODYSSEUS_ADMIN_PASSWORD:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434/v1}"
      ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
      SECURE_COOKIES: "false"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  ollama_data:

